<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Brokers — Agente de Atención</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #EEF1F4;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    padding: 16px;
  }
  #root { width: 100%; max-width: 480px; }
  @keyframes pulse {
    0%,80%,100%{opacity:0.3;transform:scale(0.9)}
    40%{opacity:1;transform:scale(1)}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const COLORS = {
  darkBlue: "#1E2D45", midBlue: "#2C4466", steelBlue: "#4B6A8A",
  lightSilver: "#C5CDD6", paleGray: "#EEF1F4", white: "#F8F9FA",
  text: "#1C2B3A", textMuted: "#5A6E80",
};
const SYSTEM_PROMPT = `Eres el asistente virtual de GG CONSULTORES & BROKERS INDUSTRIALES®, empresa especializada en consultoría para compra, venta y renta de bodegas comerciales, bodegas industriales, naves industriales, lotes industriales y terrenos industriales en Querétaro y México. Representas al Lic. Eduardo García, Socio-Director Comercial, Consultor Financiero Especializado en Inversiones Inmobiliarias e Integrador de Proyectos Inmobiliarios.
Tu misión es calificar leads de manera conversacional, cálida y profesional. Debes hacer las siguientes 8 preguntas UNA A LA VEZ, en orden:
1. Nombre completo del prospecto
2. Nombre de su empresa
3. Giro o actividad principal de la empresa
4. Tipo de operación que busca: Inversión / Compra-Venta / Renta / Usuario Final
5. Cuántos metros cuadrados (m²) requiere
6. En qué zona o ciudad requiere el espacio industrial
7. Características técnicas requeridas: altura libre, tipo de piso, rampa, andén de carga, potencia eléctrica en kVA, u otras especificaciones
8. Para cuándo requiere disponibilidad (urgencia o fecha aproximada)
REGLAS:
- Haz UNA sola pregunta por mensaje, de forma natural y conversacional.
- Sé cálido, profesional y conciso. Máximo 2-3 líneas por respuesta.
- Al recibir la respuesta a la pregunta 8, escribe exactamente [RESUMEN_LISTO] y luego un bloque JSON con esta estructura:
{"nombre":"...","empresa":"...","giro":"...","operacion":"...","metros":"...","zona":"...","caracteristicas":"...","urgencia":"...","calificacion":"calificado|potencial|no-calificado","razon":"..."}
Criterios de calificación:
- CALIFICADO: tiene empresa definida, giro claro, más de 300 m², zona específica y urgencia próxima (menos de 6 meses)
- POTENCIAL: tiene empresa pero datos vagos, proyecto a largo plazo, o menos de 300 m²
- NO CALIFICADO: no tiene empresa, necesidades muy pequeñas o fuera del sector industrial
Inicia saludando brevemente: preséntate como asistente del Lic. Eduardo García de GG Consultores & Brokers Industriales y pide el nombre del prospecto. Habla en español mexicano, tono profesional pero accesible.`;
function GGLogo({ size = 44 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <polygon points="15,20 50,5 85,20 85,50 65,50 65,40 70,35 50,25 30,35 30,65 50,75 65,65 65,58 75,58 75,80 50,95 15,80" fill="#4B6A8A" />
      <polygon points="30,35 50,25 70,35 70,50 55,50 55,43 60,40 50,33 40,40 40,60 50,67 60,60 60,54 68,54 68,68 50,76 32,68" fill="#8A9BAD" />
      <polygon points="50,5 85,20 85,35 70,35 50,25" fill="#C5CDD6" />
      <polygon points="50,25 70,35 70,50 55,50 55,43 60,40 50,33" fill="#EEF1F4" />
    </svg>
  );
}
function TypingDots() {
  return (
    <div style={{ display:"flex", gap:5, alignItems:"center", padding:"10px 14px" }}>
      {[0,1,2].map(i => (
        <div key={i} style={{ width:7, height:7, borderRadius:"50%", background:COLORS.steelBlue, animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite` }} />
      ))}
    </div>
  );
}
function SummaryCard({ data, onRestart }) {
  const badgeConfig = {
    "calificado": { bg:"#1a3a2a", color:"#4CAF80", label:"LEAD CALIFICADO" },
    "potencial": { bg:"#1a2a3a", color:"#6B8FAD", label:"LEAD POTENCIAL" },
    "no-calificado": { bg:"#3a1a1a", color:"#E07070", label:"NO CALIFICADO" },
  };
  const badge = badgeConfig[data.calificacion] || badgeConfig["potencial"];
  const rows = [
    ["Nombre", data.nombre], ["Empresa", data.empresa], ["Giro", data.giro],
    ["Operación", data.operacion], ["Metros (m²)", data.metros], ["Zona", data.zona],
    ["Características", data.caracteristicas], ["Urgencia", data.urgencia],
  ];
  return (
    <div style={{ background:COLORS.white, border:`1.5px solid ${COLORS.steelBlue}`, borderRadius:14, padding:"18px 20px", maxWidth:"90%" }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:1.5, color:COLORS.textMuted, marginBottom:10, textTransform:"uppercase" }}>Ficha del Prospecto</div>
      <div style={{ display:"inline-block", background:badge.bg, color:badge.color, border:`1px solid ${badge.color}`, fontSize:11, fontWeight:700, letterSpacing:1, padding:"3px 12px", borderRadius:20, marginBottom:14, textTransform:"uppercase" }}>{badge.label}</div>
      {rows.map(([label, value]) => (
        <div key={label} style={{ display:"flex", gap:10, fontSize:12.5, marginBottom:6, alignItems:"flex-start" }}>
          <span style={{ color:COLORS.textMuted, minWidth:110, flexShrink:0 }}>{label}:</span>
          <span style={{ color:COLORS.text }}>{value || "—"}</span>
        </div>
      ))}
      <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${COLORS.lightSilver}`, fontSize:12, color:COLORS.textMuted, fontStyle:"italic" }}>{data.razon}</div>
      <button onClick={onRestart} style={{ marginTop:14, background:"transparent", border:`1px solid ${COLORS.lightSilver}`, color:COLORS.textMuted, fontSize:12, padding:"5px 14px", borderRadius:8, cursor:"pointer" }}>+ Calificar otro lead</button>
    </div>
  );
}
function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [summary, setSummary] = useState(null);
  const [history, setHistory] = useState([]);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  useEffect(() => { startChat(); }, []);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);
  async function callClaude(newHistory) {
    setLoading(true);
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM_PROMPT, messages: newHistory }),
      });
      const data = await res.json();
      const raw = (data.content || []).map(b => b.text || "").join("");
      const updatedHistory = [...newHistory, { role:"assistant", content:raw }];
      setHistory(updatedHistory);
      if (raw.includes("[RESUMEN_LISTO]")) {
        const jsonMatch = raw.match(/\{[\s\S]*\}/);
        const before = raw.split("[RESUMEN_LISTO]")[0].trim();
        if (before) setMessages(m => [...m, { role:"agent", text:before }]);
        if (jsonMatch) {
          try { setSummary(JSON.parse(jsonMatch[0])); }
          catch { setMessages(m => [...m, { role:"agent", text:"He recopilado la información del prospecto." }]); }
        }
        setDone(true);
      } else {
        setMessages(m => [...m, { role:"agent", text:raw }]);
      }
    } catch {
      setMessages(m => [...m, { role:"system", text:"Error de conexión. Por favor intente de nuevo." }]);
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 100);
  }
  async function startChat() {
    setMessages([]); setSummary(null); setDone(false);
    const h = []; setHistory(h); await callClaude(h);
  }
  async function sendMessage() {
    if (!input.trim() || loading || done) return;
    const text = input.trim(); setInput("");
    const newHistory = [...history, { role:"user", content:text }];
    setHistory(newHistory);
    setMessages(m => [...m, { role:"user", text }]);
    await callClaude(newHistory);
  }
  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }
  return (
    <div style={{ fontFamily:"'Segoe UI', sans-serif", background:COLORS.paleGray, borderRadius:18, overflow:"hidden", minHeight:580, maxHeight:"90vh", display:"flex", flexDirection:"column", border:`1px solid ${COLORS.lightSilver}`, boxShadow:"0 4px 24px rgba(44,68,102,0.10)" }}>
      <div style={{ background:`linear-gradient(135deg, ${COLORS.darkBlue} 0%, ${COLORS.midBlue} 100%)`, padding:"14px 20px", display:"flex", alignItems:"center", gap:14, borderBottom:`2px solid ${COLORS.steelBlue}` }}>
        <GGLogo size={44} />
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, fontSize:13, color:COLORS.white, letterSpacing:0.5, lineHeight:1.2 }}>GG CONSULTORES & BROKERS INDUSTRIALES®</div>
          <div style={{ fontSize:11, color:COLORS.lightSilver, marginTop:2 }}>Agente de Atención — Lic. Eduardo García</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <div style={{ width:8, height:8, background: loading ? COLORS.lightSilver : "#4CAF80", borderRadius:"50%", transition:"background 0.3s" }} />
          <span style={{ fontSize:11, color:COLORS.lightSilver }}>{loading ? "Escribiendo..." : "En línea"}</span>
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"18px 16px", display:"flex", flexDirection:"column", gap:10, background:"#F5F7FA" }}>
        {messages.map((msg, i) => (
          <div key={i} style={{ alignSelf: msg.role==="user" ? "flex-end" : msg.role==="system" ? "center" : "flex-start", maxWidth: msg.role==="system" ? "70%" : "85%" }}>
            {msg.role === "agent" && <div style={{ fontSize:11, color:COLORS.textMuted, marginBottom:3, paddingLeft:2 }}>Asistente GG Brokers</div>}
            <div style={{ background: msg.role==="user" ? COLORS.midBlue : msg.role==="system" ? "transparent" : COLORS.white, color: msg.role==="user" ? COLORS.white : msg.role==="system" ? COLORS.textMuted : COLORS.text, border: msg.role==="agent" ? `1px solid ${COLORS.lightSilver}` : msg.role==="system" ? `1px dashed ${COLORS.lightSilver}` : "none", borderRadius: msg.role==="user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", padding:"10px 14px", fontSize:13.5, lineHeight:1.6, fontStyle: msg.role==="system" ? "italic" : "normal", textAlign: msg.role==="system" ? "center" : "left" }}>
              {msg.text}
            </div>
          </div>
        ))}
        {summary && <SummaryCard data={summary} onRestart={startChat} />}
        {loading && <div style={{ alignSelf:"flex-start", background:COLORS.white, border:`1px solid ${COLORS.lightSilver}`, borderRadius:"14px 14px 14px 4px" }}><TypingDots /></div>}
        <div ref={bottomRef} />
      </div>
      <div style={{ background:COLORS.white, borderTop:`1px solid ${COLORS.lightSilver}`, padding:"12px 16px", display:"flex", gap:10, alignItems:"flex-end" }}>
        <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey} disabled={loading || done} placeholder={done ? "Conversación finalizada" : "Escribe tu respuesta aquí..."} rows={1} style={{ flex:1, background:COLORS.paleGray, border:`1px solid ${COLORS.lightSilver}`, borderRadius:10, padding:"10px 14px", color:COLORS.text, fontSize:13.5, fontFamily:"inherit", resize:"none", outline:"none", minHeight:42, maxHeight:100, lineHeight:1.4, opacity:(loading||done)?0.5:1 }} />
        <button onClick={sendMessage} disabled={loading || done || !input.trim()} style={{ background: loading||done||!input.trim() ? COLORS.lightSilver : COLORS.midBlue, border:"none", borderRadius:10, width:42, height:42, cursor: loading||done||!input.trim() ? "not-allowed" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill={COLORS.white}><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  );
}
ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
