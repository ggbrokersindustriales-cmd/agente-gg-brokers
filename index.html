<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Brokers — Agente de Atención</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EEF1F4; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',sans-serif; padding:16px; }
#app { width:100%; max-width:480px; background:#f5f7fa; border-radius:18px; overflow:hidden; border:1px solid #C5CDD6; box-shadow:0 4px 24px rgba(44,68,102,0.10); display:flex; flex-direction:column; height:90vh; max-height:680px; }
.header { background:linear-gradient(135deg,#1E2D45,#2C4466); padding:14px 20px; display:flex; align-items:center; gap:14px; border-bottom:2px solid #4B6A8A; }
.header-text { flex:1; }
.header-title { font-weight:700; font-size:13px; color:#F8F9FA; letter-spacing:0.5px; line-height:1.2; }
.header-sub { font-size:11px; color:#C5CDD6; margin-top:2px; }
.status { display:flex; align-items:center; gap:6px; }
.dot { width:8px; height:8px; border-radius:50%; background:#4CAF80; }
.dot.loading { background:#C5CDD6; }
.status-text { font-size:11px; color:#C5CDD6; }
.messages { flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:10px; }
.msg-wrap { display:flex; flex-direction:column; }
.msg-wrap.user { align-items:flex-end; }
.msg-wrap.agent { align-items:flex-start; }
.msg-label { font-size:11px; color:#5A6E80; margin-bottom:3px; padding-left:2px; }
.bubble { padding:10px 14px; font-size:13.5px; line-height:1.6; border-radius:14px; max-width:85%; }
.bubble.user { background:#2C4466; color:#F8F9FA; border-radius:14px 14px 4px 14px; }
.bubble.agent { background:#fff; color:#1C2B3A; border:1px solid #C5CDD6; border-radius:14px 14px 14px 4px; }
.bubble.system { background:transparent; color:#5A6E80; border:1px dashed #C5CDD6; font-style:italic; text-align:center; border-radius:14px; align-self:center; max-width:70%; }
.typing { display:flex; gap:5px; align-items:center; padding:10px 14px; background:#fff; border:1px solid #C5CDD6; border-radius:14px 14px 14px 4px; width:fit-content; }
.typing span { width:7px; height:7px; border-radius:50%; background:#4B6A8A; display:inline-block; animation:pulse 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.9)} 40%{opacity:1;transform:scale(1)} }
.input-area { background:#fff; border-top:1px solid #C5CDD6; padding:12px 16px; display:flex; gap:10px; align-items:flex-end; }
textarea { flex:1; background:#EEF1F4; border:1px solid #C5CDD6; border-radius:10px; padding:10px 14px; color:#1C2B3A; font-size:13.5px; font-family:inherit; resize:none; outline:none; min-height:42px; max-height:100px; line-height:1.4; }
button { background:#2C4466; border:none; border-radius:10px; width:42px; height:42px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
button:disabled { background:#C5CDD6; cursor:not-allowed; }
.summary { background:#fff; border:1.5px solid #4B6A8A; border-radius:14px; padding:18px 20px; max-width:90%; }
.summary-title { font-size:11px; font-weight:700; letter-spacing:1.5px; color:#5A6E80; margin-bottom:10px; text-transform:uppercase; }
.badge { display:inline-block; font-size:11px; font-weight:700; letter-spacing:1px; padding:3px 12px; border-radius:20px; margin-bottom:14px; text-transform:uppercase; }
.row { display:flex; gap:10px; font-size:12.5px; margin-bottom:6px; }
.row-label { color:#5A6E80; min-width:110px; flex-shrink:0; }
.razon { margin-top:10px; padding-top:10px; border-top:1px solid #C5CDD6; font-size:12px; color:#5A6E80; font-style:italic; }
.restart-btn { margin-top:14px; background:transparent; border:1px solid #C5CDD6; color:#5A6E80; font-size:12px; padding:5px 14px; border-radius:8px; cursor:pointer; width:auto; height:auto; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
      <polygon points="15,20 50,5 85,20 85,50 65,50 65,40 70,35 50,25 30,35 30,65 50,75 65,65 65,58 75,58 75,80 50,95 15,80" fill="#4B6A8A"/>
      <polygon points="30,35 50,25 70,35 70,50 55,50 55,43 60,40 50,33 40,40 40,60 50,67 60,60 60,54 68,54 68,68 50,76 32,68" fill="#8A9BAD"/>
      <polygon points="50,5 85,20 85,35 70,35 50,25" fill="#C5CDD6"/>
      <polygon points="50,25 70,35 70,50 55,50 55,43 60,40 50,33" fill="#EEF1F4"/>
    </svg>
    <div class="header-text">
      <div class="header-title">GG CONSULTORES & BROKERS INDUSTRIALES®</div>
      <div class="header-sub">Agente de Atención — Lic. Eduardo García</div>
    </div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status-text">En línea</span>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Escribe tu respuesta aquí..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Eres el asistente virtual de GG CONSULTORES & BROKERS INDUSTRIALES®, empresa especializada en consultoría para compra, venta y renta de bodegas comerciales, bodegas industriales, naves industriales, lotes industriales y terrenos industriales en Querétaro y México. Representas al Lic. Eduardo García, Socio-Director Comercial, Consultor Financiero Especializado en Inversiones Inmobiliarias e Integrador de Proyectos Inmobiliarios.

Tu misión es calificar leads de manera conversacional, cálida y profesional. Debes hacer las siguientes 8 preguntas UNA A LA VEZ, en orden:
1. Nombre completo del prospecto
2. Nombre de su empresa
3. Giro o actividad principal de la empresa
4. Tipo de operación que busca: Inversión / Compra-Venta / Renta / Usuario Final
5. Cuántos metros cuadrados (m²) requiere
6. En qué zona o ciudad requiere el espacio industrial
7. Características técnicas requeridas: altura libre, tipo de piso, rampa, andén de carga, potencia eléctrica en kVA, u otras especificaciones
8. Para cuándo requiere disponibilidad (urgencia o fecha aproximada)

REGLAS:
- Haz UNA sola pregunta por mensaje, de forma natural y conversacional.
- Sé cálido, profesional y conciso. Máximo 2-3 líneas por respuesta.
- Al recibir la respuesta a la pregunta 8, escribe exactamente [RESUMEN_LISTO] y luego un bloque JSON con esta estructura:
{"nombre":"...","empresa":"...","giro":"...","operacion":"...","metros":"...","zona":"...","caracteristicas":"...","urgencia":"...","calificacion":"calificado|potencial|no-calificado","razon":"..."}

Criterios de calificación:
- CALIFICADO: tiene empresa definida, giro claro, más de 300 m², zona específica y urgencia próxima (menos de 6 meses)
- POTENCIAL: tiene empresa pero datos vagos, proyecto a largo plazo, o menos de 300 m²
- NO CALIFICADO: no tiene empresa, necesidades muy pequeñas o fuera del sector industrial

Inicia saludando brevemente y pide el nombre del prospecto. Habla en español mexicano, tono profesional pero accesible.`;

let history = [];
let loading = false;
let done = false;

function setLoading(val) {
  loading = val;
  document.getElementById('dot').className = val ? 'dot loading' : 'dot';
  document.getElementById('status-text').textContent = val ? 'Escribiendo...' : 'En línea';
  document.getElementById('send-btn').disabled = val || done;
  document.getElementById('input').disabled = val || done;
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  if (role === 'typing') {
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }
  const el = document.getElementById('typing');
  if (el) el.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role === 'user' ? 'user' : 'agent'}`;

  if (role === 'agent') {
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Asistente GG Brokers';
    wrap.appendChild(label);
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showSummary(data) {
  const msgs = document.getElementById('messages');
  const badges = {
    'calificado': { bg:'#1a3a2a', color:'#4CAF80', label:'LEAD CALIFICADO' },
    'potencial': { bg:'#1a2a3a', color:'#6B8FAD', label:'LEAD POTENCIAL' },
    'no-calificado': { bg:'#3a1a1a', color:'#E07070', label:'NO CALIFICADO' },
  };
  const badge = badges[data.calificacion] || badges['potencial'];
  const rows = [
    ['Nombre', data.nombre], ['Empresa', data.empresa], ['Giro', data.giro],
    ['Operación', data.operacion], ['Metros (m²)', data.metros], ['Zona', data.zona],
    ['Características', data.caracteristicas], ['Urgencia', data.urgencia],
  ];
  const div = document.createElement('div');
  div.className = 'summary';
  div.innerHTML = `
    <div class="summary-title">Ficha del Prospecto</div>
    <div class="badge" style="background:${badge.bg};color:${badge.color};border:1px solid ${badge.color}">${badge.label}</div>
    ${rows.map(([l,v]) => `<div class="row"><span class="row-label">${l}:</span><span>${v||'—'}</span></div>`).join('')}
    <div class="razon">${data.razon}</div>
    <button class="restart-btn" onclick="startChat()">+ Calificar otro lead</button>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function callClaude(newHistory) {
  setLoading(true);
  addMessage('typing');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM_PROMPT, messages: newHistory })
    });
    const data = await res.json();
    const el = document.getElementById('typing');
    if (el) el.remove();
    console.log('Respuesta completa:', JSON.stringify(data));
const raw = data && data.content && Array.isArray(data.content) && data.content.length > 0 ? data.content[0].text : '';
    if (!raw) { addMessage('system', 'Sin respuesta. Intente de nuevo.'); setLoading(false); return; }
    history = [...newHistory, { role: 'assistant', content: raw }];
    if (raw.includes('[RESUMEN_LISTO]')) {
      const before = raw.split('[RESUMEN_LISTO]')[0].trim();
      if (before) addMessage('agent', before);
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (jsonMatch) { try { showSummary(JSON.parse(jsonMatch[0])); } catch(e) {} }
      done = true;
      document.getElementById('input').placeholder = 'Conversación finalizada';
    } else {
      addMessage('agent', raw);
    }
  } catch(e) {
    const el = document.getElementById('typing');
    if (el) el.remove();
    addMessage('system', 'Error de conexión. Por favor intente de nuevo.');
  }
  setLoading(false);
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || loading || done) return;
  input.value = '';
  addMessage('user', text);
  const newHistory = [...history, { role: 'user', content: text }];
  await callClaude(newHistory);
}

async function startChat() {
  document.getElementById('messages').innerHTML = '';
  history = []; done = false;
  document.getElementById('input').placeholder = 'Escribe tu respuesta aquí...';
  document.getElementById('input').disabled = false;
  await callClaude([]);
}

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

startChat();
</script>
</body>
</html>
