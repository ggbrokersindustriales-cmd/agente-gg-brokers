<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EEF1F4; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',sans-serif; padding:16px; }
#app { width:100%; max-width:480px; background:#f5f7fa; border-radius:18px; overflow:hidden; border:1px solid #C5CDD6; box-shadow:0 4px 24px rgba(44,68,102,0.10); display:flex; flex-direction:column; height:90vh; max-height:680px; }
.header { background:linear-gradient(135deg,#1E2D45,#2C4466); padding:14px 20px; display:flex; align-items:center; gap:14px; border-bottom:2px solid #4B6A8A; }
.header-text { flex:1; }
.header-title { font-weight:700; font-size:13px; color:#F8F9FA; letter-spacing:0.5px; line-height:1.2; }
.header-sub { font-size:11px; color:#C5CDD6; margin-top:2px; }
.status { display:flex; align-items:center; gap:6px; }
.dot { width:8px; height:8px; border-radius:50%; background:#4CAF80; }
.dot.loading { background:#C5CDD6; }
.status-text { font-size:11px; color:#C5CDD6; }
.messages { flex:1; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:10px; }
.msg-wrap { display:flex; flex-direction:column; }
.msg-wrap.user { align-items:flex-end; }
.msg-wrap.agent { align-items:flex-start; }
.msg-label { font-size:11px; color:#5A6E80; margin-bottom:3px; padding-left:2px; }
.bubble { padding:10px 14px; font-size:13.5px; line-height:1.6; border-radius:14px; max-width:85%; }
.bubble.user { background:#2C4466; color:#F8F9FA; border-radius:14px 14px 4px 14px; }
.bubble.agent { background:#fff; color:#1C2B3A; border:1px solid #C5CDD6; border-radius:14px 14px 14px 4px; }
.bubble.system { background:transparent; color:#5A6E80; border:1px dashed #C5CDD6; font-style:italic; text-align:center; border-radius:14px; align-self:center; max-width:70%; }
.typing { display:flex; gap:5px; align-items:center; padding:10px 14px; background:#fff; border:1px solid #C5CDD6; border-radius:14px 14px 14px 4px; width:fit-content; }
.typing span { width:7px; height:7px; border-radius:50%; background:#4B6A8A; display:inline-block; animation:pulse 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.9)} 40%{opacity:1;transform:scale(1)} }
.input-area { background:#fff; border-top:1px solid #C5CDD6; padding:12px 16px; display:flex; gap:10px; align-items:flex-end; }
textarea { flex:1; background:#EEF1F4; border:1px solid #C5CDD6; border-radius:10px; padding:10px 14px; color:#1C2B3A; font-size:13.5px; font-family:inherit; resize:none; outline:none; min-height:42px; max-height:100px; line-height:1.4; }
button { background:#2C4466; border:none; border-radius:10px; width:42px; height:42px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
button:disabled { background:#C5CDD6; cursor:not-allowed; }
</style>
</head>

chatHistory = [];
var loading = false;
var done = false;

function setLoading(val) {
  loading = val;
  document.getElementById("dot").className = val ? "dot loading" : "dot";
  document.getElementById("status-text").textContent = val ? "Escribiendo..." : "En linea";
  document.getElementById("send-btn").disabled = val || done;
  document.getElementById("input").disabled = val || done;
}

function addMessage(role, text) {
  var msgs = document.getElementById("messages");
  if (role === "typing") {
    var t = document.createElement("div");
    t.id = "typing";
    t.className = "typing";
    t.innerHTML = "<span></span><span></span><span></span>";
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }
  var el = document.getElementById("typing");
  if (el) el.remove();
  var wrap = document.createElement("div");
  wrap.className = "msg-wrap " + (role === "user" ? "user" : "agent");
  if (role === "agent") {
    var label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = "Asistente GG Brokers";
    wrap.appendChild(label);
  }
  var bubble = document.createElement("div");
  bubble.className = "bubble " + role;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function callClaude(newHistory) {
  setLoading(true);
  addMessage("typing");
  fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},

  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var el = document.getElementById("typing");
    if (el) el.remove();
    var raw = "";
    if (data && data.content && data.content.length > 0) {
      raw = data.content[0].text || "";
    }
    if (!raw) {
      addMessage("agent", "Sin respuesta. Intente de nuevo.");
      setLoading(false);
      return;
    }
    chatHistory = newHistory.concat([{role: "assistant", content: raw}]);
    if (raw.indexOf("[RESUMEN_LISTO]") !== -1) {
      var before = raw.split("[RESUMEN_LISTO]")[0].trim();
      if (before) addMessage("agent", before);

  try {

    var msg = "Hola Eduardo, nuevo prospecto de tu agente GG Brokers:%0A%0A" +
      "Nombre: " + (d.nombre||"") + "%0A" +
      "Empresa: " + (d.empresa||"") + "%0A" +

      "Metros: " + (d.metros||"") + "%0A" +
      "Zona: " + (d.zona||"") + "%0A" +
      "Caracteristicas: " + (d.caracteristicas||"") + "%0A" +
      "Urgencia: " + (d.urgencia||"") + "%0A" +
      "WhatsApp: " + (d.whatsapp||"") + "%0A" +
      "Correo: " + (d.correo||"") + "%0A" +
      "Calificacion: " + (d.calificacion||"").toUpperCase() + "%0A" +
      "Razon: " + (d.razon||"");
    var waLink = "https://wa.me/524424571050?text=" + msg;
    var msgs2 = document.getElementById("messages");
    var btnWrap = document.createElement("div");
    btnWrap.style.cssText = "display:flex;justify-content:center;margin-top:16px;";
    var waBtn = document.createElement("a");
    waBtn.href = waLink;
    waBtn.target = "_blank";
    waBtn.style.cssText = "background:#25D366;color:white;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;";
    waBtn.innerHTML = "Enviar informacion al asesor";
    btnWrap.appendChild(waBtn);
    msgs2.appendChild(btnWrap);
    msgs2.scrollTop = msgs2.scrollHeight;
  } catch(e) { console.log("Error JSON:", e); } return;

if (jsonMatch) {
  try {
    var d = JSON.parse(jsonMatch[0]);
    var msg = "Hola Eduardo, te comparto un nuevo prospecto calificado por tu agente GG Brokers:%0A%0A" +
      "Nombre: " + d.nombre + "%0A" +
      "Empresa: " + d.empresa + "%0A" +

      "Operacion: " + d.operacion + "%0A" +
      "Metros: " + d.metros + "%0A" +
      "Zona: " + d.zona + "%0A" +

      "Urgencia: " + d.urgencia + "%0A" +

    btnWrap.style.cssText = "display:flex;justify-content:center;margin-top:16px;";

    waBtn.href = waLink;
    waBtn.target = "_blank";

    msgs.appendChild(btnWrap);
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {}

      addMessage("agent", raw);
    }
    setLoading(false);
  })
  .catch(function() {
    var el = document.getElementById("typing");
    if (el) el.remove();
    addMessage("agent", "Error de conexion. Intente de nuevo.");
    setLoading(false);
  });
}

function sendMessage() {
  var input = document.getElementById("input");
  var text = input.value.trim();
  if (!text || loading || done) return;
  input.value = "";
  addMessage("user", text);
  var newHistory = chatHistory.concat([{role: "user", content: text}]);
  callClaude(newHistory);
}

function startChat() {
  document.getElementById("messages").innerHTML = "";
  history = [];
  done = false;
  document.getElementById("input").placeholder = "Escribe tu respuesta aqui...";
  document.getElementById("input").disabled = false;
  callClaude([{role: "user", content: "Hola"}]);
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

startChat();
</script>
